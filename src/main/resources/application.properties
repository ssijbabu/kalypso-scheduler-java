# Kalypso Scheduler Operator Configuration

# Operator Configuration
operator.name=kalypso-scheduler
operator.version=1.0.0

# Kubernetes Configuration
kubernetes.namespace=kalypso
kubernetes.client.retries=3
kubernetes.client.retry-interval-ms=1000

# Flux Configuration
flux.default-namespace=flux-system
flux.git-repository-api-group=source.toolkit.fluxcd.io
flux.git-repository-version=v1beta2
flux.kustomization-api-group=kustomize.toolkit.fluxcd.io
flux.kustomization-version=v1beta2

# Template Processing
template.engine=freemarker
template.cache-enabled=true
template.cache-size=1000

# GitHub Configuration
github.api-endpoint=https://api.github.com
github.connection-timeout-seconds=30
github.read-timeout-seconds=30

# Reconciliation Configuration
reconciliation.retry-delay-seconds=5
reconciliation.max-retries=3

# Status Condition Configuration
status.condition-ready-type=Ready
status.condition-failed-type=Failed
status.condition-processing-type=Processing
